# Tech Company Web Crawler - Configuration File
# All settings centralized here

# Application Settings
app:
  name: "Tech Job Crawler"
  version: "1.0.0"
  debug: true
  log_level: "INFO"
  host: "0.0.0.0"
  port: 8000

# Database Configuration
database:
  type: "mysql"
  host: "localhost"
  port: 3308
  username: "root"
  password: ""
  name: "tech_jobs_db"
  pool_size: 10
  max_overflow: 20
  echo: false

# SQLite Configuration (uncomment if you want to use file-based DB)
# database:
#   type: "sqlite"
#   path: "data/tech_jobs.db"  # Path relative to project root

# Redis Configuration (for caching and message queue)
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: null
  key_prefix: "tech_crawler:"

# Celery Message Queue Configuration
celery:
  broker_url: "redis://localhost:6379/1"
  result_backend: "redis://localhost:6379/2"
  task_serializer: "json"
  result_serializer: "json"
  accept_content: ["json"]
  timezone: "UTC"
  enable_utc: true
  task_acks_late: true
  worker_prefetch_multiplier: 4

# Web Crawler Configuration
crawler:
  # Rate limiting settings
  request_delay: 2.0  # seconds between requests
  max_retries: 3
  timeout: 30
  max_concurrent: 5
  
  # Respect robots.txt
  respect_robots_txt: true
  user_agent: "TechJobCrawler/1.0 (+https://example.com/bot)"
  
  # Retry configuration
  retry_codes:
    - 429  # Too Many Requests
    - 500  # Internal Server Error
    - 502  # Bad Gateway
    - 503  # Service Unavailable
    - 504  # Gateway Timeout
  
  # DFW Area Configuration
  dfw_cities:
    - "Dallas"
    - "Fort Worth"
    - "Arlington"
    - "Plano"
    - "Irving"
    - "Frisco"
    - "Richardson"
    - "Addison"
    - "Garland"
    - "McKinney"
    - "Denton"
  
  # Target company types
  target_industries:
    - "Technology"
    - "Software"
    - "Cloud Computing"
    - "AI/ML"
    - "Data Science"
    - "Cybersecurity"
  
  # Job boards to crawl
  job_boards:
    - "linkedin.com"
    - "indeed.com"
    - "glassdoor.com"
    - "ziprecruiter.com"
    - "dice.com"
    - "careerbuilder.com"
    - "monster.com"
    - "techjobs.com"
    - "stackoverflow.com"
    - "angel.co"

# NLP Configuration
nlp:
  model: "en_core_web_sm"
  min_skill_length: 2
  max_skill_length: 50
  
  # Skill categories
  skill_categories:
    - "programming_languages"
    - "frameworks_libraries"
    - "databases"
    - "cloud_platforms"
    - "tools_technologies"
    - "soft_skills"
    - "certifications"
  
  # Experience levels
  experience_mapping:
    "entry": ["entry", "junior", "0-2 years", "0-1 years", "fresh graduate"]
    "mid": ["mid", "intermediate", "2-5 years", "3-5 years"]
    "senior": ["senior", "5-8 years", "5-10 years", "8+ years"]
    "lead": ["lead", "principal", "staff", "8+ years", "10+ years"]
    "executive": ["director", "vp", "vice president", "cto", "chief"]

# AI Interview Practice Configuration
interview:
  speech_to_text:
    engine: "google"
    language: "en-US"
    timeout: 30
  
  feedback:
    min_filler_words_threshold: 0.05
    max_speaking_rate_wpm: 160
    min_speaking_rate_wpm: 100
  
  # Interview types
  interview_types:
    - "behavioral"
    - "technical"
    - "mixed"
    - "system_design"
    - "coding"
  
  # Question banks
  question_bank_path: "data/interview_questions"

# LinkedIn Configuration (Use responsibly)
linkedin:
  enabled: true  # Set to true only if you have proper authorization
  rate_limit: 100  # requests per hour
  scroll_pause: 2.0  # seconds

# Skill Gap Analysis
skill_gap:
  supported_formats:
    - ".pdf"
    - ".docx"
    - ".txt"
    - ".json"
  max_file_size_mb: 10
  match_threshold: 0.3  # 30% match minimum

# Monitoring & Logging
monitoring:
  log_file: "logs/app.log"
  log_max_size_mb: 100
  log_backup_count: 5
  enable_metrics: true
  metrics_port: 9090

# API Keys (Load from environment variables)
api_keys:
  openai: "${OPENAI_API_KEY}"
  gemini: "${GEMINI_API_KEY}"
  anthropic: "${ANTHROPIC_API_KEY}"
  linkedin: "${LINKEDIN_API_KEY}"

# File Paths
paths:
  data_dir: "data"
  output_dir: "output"
  resumes_dir: "resumes"
  models_dir: "models"
  cache_dir: "cache"
